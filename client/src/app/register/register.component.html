<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-4">
            <form #registerForm="ngForm" (ngSubmit)="register()" autocomplete="off">
                <h2 class="text-center text-primary"> Registrar o craque</h2> 
                <hr>
                <div class="mb-3">
                    <input type="text" class="form-control" name="usuario" [(ngModel)]="model.usuario" placeholder="Usuário">
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" name="senha" [(ngModel)]="model.senha" placeholder="Senha">
                </div>
                <div class="text-center">
                    <button class="btn btn-success me-2" type="submit">Registrar</button>
                </div>
            </form>
        </div>
    </div>
</div>
